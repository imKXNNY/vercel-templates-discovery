name: Bug report
description: Report a bug or unexpected behavior in the CLI, API, or MCP server.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the tool are you running? (run `vercel-templates --version`)
      placeholder: e.g. 1.0.0
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Which implementation are you using?
      options:
        - Python (pip)
        - Node.js (npm)
        - Docker
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and the exact command or code that triggered it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any error messages, stack traces, or screenshots.
      render: shell
